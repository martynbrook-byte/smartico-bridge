# Smartico Bridge Nginx template.
#
# Replace:
#   bridge.example.com        -> your real domain
#   YOUR_OFFICE_IP/32         -> allowed dashboard/admin IP
#   YOUR_HOME_IP/32           -> allowed dashboard/admin IP
#   YOUR_VPN_CIDR             -> allowed VPN CIDR, e.g. 203.0.113.0/24
#   /etc/letsencrypt/...      -> certificate paths created by certbot
#
# Install example:
#   sudo cp deploy/nginx/smartico-bridge.conf /etc/nginx/sites-available/smartico-bridge
#   sudo ln -s /etc/nginx/sites-available/smartico-bridge /etc/nginx/sites-enabled/smartico-bridge
#   sudo nginx -t
#   sudo systemctl reload nginx

upstream smartico_bridge {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80;
    server_name bridge.example.com;

    # Let certbot/http-01 challenges work before HTTPS is issued.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name bridge.example.com;

    ssl_certificate     /etc/letsencrypt/live/bridge.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bridge.example.com/privkey.pem;

    client_max_body_size 25M;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Public health endpoint for uptime checks.
    location = /api/health {
        proxy_pass http://smartico_bridge;
    }

    # Public endpoints needed by the Figma plugin.
    #
    # Nginx cannot reliably IP-allowlist Figma itself because requests usually
    # come from the user's browser/desktop network, not from stable Figma IPs.
    # Use the plugin manifest's networkAccess.allowedDomains plus an app-level
    # token/API key for stronger protection on these routes before exposing
    # write-capable endpoints such as /api/assets and /api/pipelines.
    location ^~ /api/figma/ {
        proxy_pass http://smartico_bridge;
    }

    location ^~ /api/assets {
        proxy_pass http://smartico_bridge;
    }

    location ^~ /api/pipelines {
        proxy_pass http://smartico_bridge;
    }

    # The plugin currently patches the active dataset label. If this is not
    # needed in production, remove this block so dataset writes stay IP-locked.
    location ^~ /api/datasets/ {
        proxy_pass http://smartico_bridge;
    }

    location = /api/proxy-image {
        proxy_pass http://smartico_bridge;
    }

    location = /api/plugin/download {
        proxy_pass http://smartico_bridge;
    }

    # Dashboard and all other admin/write APIs are limited to trusted networks.
    location / {
        allow 145.224.65.36/32;
        deny all;

        proxy_pass http://smartico_bridge;
    }
}
