# Smartico Bridge HTTP reverse proxy template.
#
# This file is installed by scripts/start-production.sh after replacing:
#   __SERVER_NAME__ -> NGINX_SERVER_NAME, defaults to _
#   __APP_PORT__    -> PORT, defaults to 3001
#
# Optional IP allowlisting is handled through this include file:
#   /etc/nginx/snippets/smartico-bridge-allowlist.conf
#
# If NGINX_ALLOW_CIDRS is empty, the startup script writes an empty include and
# the site is public on port 80. If NGINX_ALLOW_CIDRS is set, the startup script
# writes allow/deny rules into that include.

upstream smartico_bridge {
    server 127.0.0.1:__APP_PORT__;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name __SERVER_NAME__;

    client_max_body_size 25M;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location / {
        include /etc/nginx/snippets/smartico-bridge-allowlist.conf;
        proxy_pass http://smartico_bridge;
    }
}
