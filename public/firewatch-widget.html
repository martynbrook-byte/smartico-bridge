<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smartico Bridge · Firewatch Widget</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #22263a;
    --border:   #2e3348;
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --gold:     #f5c842;
    --purple:   #BB00FF;
    --green:    #22c55e;
    --red:      #f87171;
    --blue:     #60a5fa;
    --radius:   8px;
    --font:     'Inter', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .widget-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .widget-logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--gold);
  }
  .widget-logo span { font-size: 20px; }
  .widget-subtitle {
    color: var(--muted);
    font-size: 0.75rem;
  }
  .widget-header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .status-pill.ok    { background: rgba(34,197,94,0.15); color: var(--green); }
  .status-pill.error { background: rgba(248,113,113,0.15); color: var(--red); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.ok    { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.error { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  .uptime {
    color: var(--muted);
    font-size: 0.72rem;
  }

  /* ── Body ── */
  .widget-body {
    flex: 1;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── Stats row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-value {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Section ── */
  .section-title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  /* ── Latest upload card ── */
  .latest-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .latest-icon {
    font-size: 22px;
    flex-shrink: 0;
  }
  .latest-info { flex: 1; min-width: 0; }
  .latest-label {
    font-weight: 700;
    font-size: 0.88rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .latest-meta {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .latest-badge {
    flex-shrink: 0;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .latest-badge.processed  { background: rgba(34,197,94,0.15); color: var(--green); }
  .latest-badge.raw        { background: rgba(96,165,250,0.15); color: var(--blue); }

  /* ── Recent datasets list ── */
  .dataset-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .dataset-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
  }
  .dataset-row:last-child { border-bottom: none; }
  .dataset-row-label {
    flex: 1;
    min-width: 0;
    font-size: 0.82rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dataset-row-rows {
    flex-shrink: 0;
    color: var(--muted);
    font-size: 0.75rem;
    font-variant-numeric: tabular-nums;
  }
  .dataset-row-time {
    flex-shrink: 0;
    color: var(--muted);
    font-size: 0.72rem;
    min-width: 60px;
    text-align: right;
  }

  /* ── Rule sets + pipelines ── */
  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.72rem;
    color: var(--text);
  }
  .tag.purple { border-color: rgba(187,0,255,0.4); color: var(--purple); background: rgba(187,0,255,0.08); }
  .tag.blue   { border-color: rgba(96,165,250,0.4); color: var(--blue);   background: rgba(96,165,250,0.08); }

  /* ── Footer ── */
  .widget-footer {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--muted);
  }
  .widget-footer a {
    color: var(--gold);
    text-decoration: none;
  }
  .widget-footer a:hover { text-decoration: underline; }

  /* ── Loading / error ── */
  .loading {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .empty-hint {
    color: var(--muted);
    font-size: 0.78rem;
    font-style: italic;
    padding: 8px 14px;
  }
</style>
</head>
<body>

<div class="widget-header">
  <div>
    <div class="widget-logo"><span>🎰</span> Smartico Bridge</div>
    <div class="widget-subtitle">winners data pipeline</div>
  </div>
  <div class="widget-header-right">
    <div id="statusPill" class="status-pill ok">
      <div class="status-dot ok" id="statusDot"></div>
      <span id="statusText">Checking…</span>
    </div>
    <div class="uptime" id="uptimeEl"></div>
  </div>
</div>

<div id="widgetBody" class="widget-body loading">
  <span class="pulse">Loading…</span>
</div>

<div class="widget-footer">
  <span id="checkedAt">—</span>
  <a href="/" target="_blank">Open dashboard ↗</a>
</div>

<script>
const API = '/api/health';
const REFRESH_MS = 30000;

function fmtNumber(n) { return (n || 0).toLocaleString(); }

function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const s = Math.floor(diff / 1000);
  if (s < 60)  return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60)  return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function fmtUptime(sec) {
  if (!sec) return '';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (h > 0) return `up ${h}h ${m}m`;
  return `up ${m}m`;
}

function render(data) {
  const ds  = data.datasets || {};
  const ps  = data.pipelines || {};
  const rs  = data.ruleSets || {};
  const dz  = data.dropzones || {};
  const latest = ds.latest;
  const recent = ds.recentProcessed || [];

  // Header status
  const dot  = document.getElementById('statusDot');
  const pill = document.getElementById('statusPill');
  const txt  = document.getElementById('statusText');
  dot.className  = 'status-dot ok';
  pill.className = 'status-pill ok';
  txt.textContent = 'Online';
  document.getElementById('uptimeEl').textContent = fmtUptime(data.uptimeSec);
  document.getElementById('checkedAt').textContent = `Updated ${timeAgo(data.checkedAt)}`;

  // Latest upload card
  let latestHtml = '';
  if (latest) {
    const badge = latest.isProcessed
      ? `<span class="latest-badge processed">Processed</span>`
      : `<span class="latest-badge raw">Raw</span>`;
    latestHtml = `
      <div class="latest-card">
        <div class="latest-icon">📁</div>
        <div class="latest-info">
          <div class="latest-label">${esc(latest.label)}</div>
          <div class="latest-meta">${fmtNumber(latest.rowCount)} rows · ${timeAgo(latest.uploadedAt)}${latest.pipelineName ? ' · ' + esc(latest.pipelineName) : ''}</div>
        </div>
        ${badge}
      </div>`;
  } else {
    latestHtml = `<div class="empty-hint">No datasets yet</div>`;
  }

  // Recent processed list
  let recentHtml = '';
  if (recent.length) {
    recentHtml = recent.map(d => `
      <div class="dataset-row">
        <div class="dataset-row-label">${esc(d.label)}</div>
        <div class="dataset-row-rows">${fmtNumber(d.rowCount)} rows</div>
        <div class="dataset-row-time">${timeAgo(d.uploadedAt)}</div>
      </div>`).join('');
  } else {
    recentHtml = `<div class="empty-hint">No processed datasets yet</div>`;
  }

  // Rule sets tags
  const rsTags = (rs.names || []).map(n => `<span class="tag purple">${esc(n)}</span>`).join('') || '<span style="color:var(--muted);font-size:0.75rem">None</span>';

  // Pipeline tags
  const pTags = (ps.names || []).map(n => `<span class="tag blue">${esc(n)}</span>`).join('') || '<span style="color:var(--muted);font-size:0.75rem">None</span>';

  document.getElementById('widgetBody').className = 'widget-body';
  document.getElementById('widgetBody').innerHTML = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value">${ds.total || 0}</div>
        <div class="stat-label">Datasets</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${ds.processed || 0}</div>
        <div class="stat-label">Processed</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${ps.total || 0}</div>
        <div class="stat-label">Pipelines</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${rs.total || 0}</div>
        <div class="stat-label">Rule Sets</div>
      </div>
    </div>

    <div>
      <div class="section-title">Latest upload</div>
      ${latestHtml}
    </div>

    <div>
      <div class="section-title">Recent processed datasets</div>
      <div class="dataset-list">${recentHtml}</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div>
        <div class="section-title">Rule sets</div>
        <div class="tag-cloud">${rsTags}</div>
      </div>
      <div>
        <div class="section-title">Pipelines</div>
        <div class="tag-cloud">${pTags}</div>
      </div>
    </div>
  `;
}

function renderError(msg) {
  const dot  = document.getElementById('statusDot');
  const pill = document.getElementById('statusPill');
  const txt  = document.getElementById('statusText');
  dot.className  = 'status-dot error';
  pill.className = 'status-pill error';
  txt.textContent = 'Offline';
  document.getElementById('widgetBody').className = 'widget-body loading';
  document.getElementById('widgetBody').innerHTML = `<span style="color:var(--red)">${esc(msg)}</span>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function poll() {
  try {
    const r = await fetch(API);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'Service error');
    render(data);
  } catch (err) {
    renderError(err.message);
  }
}

poll();
setInterval(poll, REFRESH_MS);
</script>
</body>
</html>
